name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: recsys
          POSTGRES_PASSWORD: recsys
          POSTGRES_DB: recsys
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recsys"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://recsys:recsys@localhost:5432/recsys

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check . || true

      - name: Apply migrations on PostgreSQL
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

      - name: Recsys simulation (smoke)
        run: python -m scripts.db_smoke
